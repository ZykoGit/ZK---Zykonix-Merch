<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZK ✦ Zyko Logo Sweaters</title>
  
    <link rel="stylesheet" href="../style.css">
  
</head>

<body>
    <header class="zk-header">
        <div class="zk-logo">ZK</div>

        <nav id="nav-menu" class="zk-nav">
            <a href="../../">Home</a>
            <a href="../../merch/">Merch</a>
            <a href="../../products/">Online Products</a>
        </nav>

        <button id="hamburger" class="zk-hamburger">☰</button>
    </header>

    <main class="product-page">
        <div class="product-gallery">
            <img id="mainImage" src="../../assets/IMG_3264.jpeg" alt="Product Image">

            <div class="thumbnail-row">
                <img class="thumb active" src="../../assets/example1.png" data-img="../../assets/example1.png">
                <img class="thumb" src="../../assets/example2.png" data-img="../../assets/example2.png">
                <img class="thumb" src="../../assets/example3.png" data-img="../../assets/example3.png">
                <img class="thumb" src="../../assets/example4.png" data-img="../../assets/example4.png">
            </div>
        </div>

        <div class="product-info">
            <h1>Zyko Logo Sweaters</h1>
            <p class="price">$54.99-34.99</p>

            <p class="description">
                Clean warm sweaters with the Zyko logog you can wear to show your support!
            </p>

            <a class="buy-button" href="https://your-product-link.com" target="_blank">
                Get Now (will redicrect you to where you can choose the style and purchase) 
            </a>
        </div>
    </main>

    <script src="../script.js"></script>
</body>
</html>
